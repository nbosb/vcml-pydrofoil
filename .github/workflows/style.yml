name: style

on:
  push:
    branches: [ * ]
  pull_request:
    branches: [ * ]

jobs:
  style:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: 'recursive'

      - name: Check Code Style
        run: ./utils/format -n