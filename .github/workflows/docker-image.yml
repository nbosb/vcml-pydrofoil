name: Docker Image CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        run: |
          docker build -t vcml-pydrofoil:latest .

      - name: Save image as OCI archive (Podman + Docker compatible)
        run: |
          docker save vcml-pydrofoil:latest -o vcml-pydrofoil.tar
          gzip vcml-pydrofoil.tar

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vcml-pydrofoil-image
          path: vcml-pydrofoil.tar.gz
